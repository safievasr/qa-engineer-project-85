- summary: |
    Проверка таймера в активной игре, при истечении времени игра завершается
  requirement: |
    Для каждого раунда устанавливается таймер (лимит времени). Если игроки не укладываются, игра завершается
  prerequisites: |
    Пользователь в активной игре
    Задача имеет таймер (например, 2 минуты)
  test-data: |
    Ожидание истечения времени без отправки решения
  steps:
    - Дождаться окончания времени на таймере
  expected-result: |
    При достижении нуля таймер останавливается. Игра завершается

