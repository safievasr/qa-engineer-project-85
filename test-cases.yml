- summary: |
    Проверка создания новой игры (битвы) с выбором уровня сложности, типом игры, контроля времени и выбором задачи
  requirement: |
    Авторизованный пользователь должен иметь возможность создать новую игру (битву)
  prerequisites: |
    Пользователь авторизован в системе
    Открыта главная страница
    Нажата кнопка "Создать битву"
  test-data: |
    Empty
  steps:
    - Выбираем уровень сложности
    - Выбираем тип игры
    - Выбираем контроль времени
    - Выбираем задачу по названию
    - Выбераем задачу по тегу
    - Нажимаем кнопку «Создать битву»
  expected-result: |
    Создаётся новая игровая комната. Пользователь попадает в лобби игры. Оба участника видят изменения кода друг друга в реальном времени

