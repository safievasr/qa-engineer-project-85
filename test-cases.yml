- summary: |
    Проверка создания новой игры (битвы) с выбором уровня сложности, типом игры, контроля времени и выбором задачи
  requirement: |
    Авторизованный пользователь должен иметь возможность создать новую игру (битву)
  prerequisites: |
    Пользователь авторизован в системе
    Открыта главная страница
    Нажата кнопка "Создать битву"
  test-data: |
    Empty
  steps:
    - Выбираем уровень сложности
    - Выбираем тип игры
    - Выбираем контроль времени
    - Выбираем задачу по названию
    - Выбераем задачу по тегу
    - Нажимаем кнопку «Создать битву»
  expected-result: |
    Создаётся новая игровая комната. Пользователь попадает в лобби игры. Оба участника видят изменения кода друг друга в реальном времени

- summary: |
    Проверка присоединения авторизованного пользователя к уже созданной игре
  requirement: |
    Авторизованный пользователь должен иметь возможность найти игру в общем списке и присоединиться к ней
  prerequisites: |
    Пользователь авторизован в системе
    Открыта главная страница
    Нажата кнопка "Присоединиться к битве"
  test-data: |
    Empty
  steps:
    - Выбираем из списка игру
    - Нажимаем кнопку «Сражаться»
  expected-result: |
    Открывается игровая комната. Пользователь попадает в лобби игры. Оба участника видят изменения кода друг друга в реальном времени

- summary: |
    Успешная проверка по решение задачи в активной игре, все тесты пройдены
  requirement: |
    В процессе игры пользователь после написания правильного решения отправляет данные на проверку и получает успешный результат
  prerequisites: |
    Создана битва. Открыта игровая комната
  test-data: |
    "Написан успешный код"
  steps:
    - В редакторе кода пишем корректное решение задачи
    - Нажимаем кнопку «Запустить»
  expected-result: |
    Успешная проверка по решению задачи, все тесты пройдены

- summary: |
    Проверку решение задачи в игре не прошла, тесты не пройдены
  requirement: |
    В процессе игры пользователь после написания не правильного решения отправляет данные на проверку и получает ошибочный результат
  prerequisites: |
    Создана битва. Открыта игровая комната
  test-data: |
    "Написан не успешный код"
  steps:
    - В редакторе кода пишем некорректное решение задачи
    - Нажимаем кнопку «Запустить»
  expected-result: |
    Проверку по решению задачи не прошла, тесты не прошли проверку

- summary: |
    Проверка таймера в активной игре, при истечении времени игра завершается
  requirement: |
    Для каждого раунда устанавливается таймер (лимит времени). Если игроки не укладываются, игра завершается
  prerequisites: |
    Пользователь в активной игре
    Задача имеет таймер (например, 2 минуты)
  test-data: |
    Ожидание истечения времени без отправки решения
  steps:
    - Дождаться окончания времени на таймере
  expected-result: |
    При достижении нуля таймер останавливается. Игра завершается

- summary: |
    Проверка возможности зайти как зритель (наблюдатель) в уже созданную игру
  requirement: |
    Пользователь должен иметь возможность наблюдать за ходом игры без возможности вмешиваться в код
  prerequisites: |
    Открыта страница со списком игр
  test-data: |
    Empty
  steps:
    - Выбрать в списке игру
    - Нажать кнопку «Наблюдать»
  expected-result: |
    Открывается окно просмотра, где виден код обоих игроков в реальном времени

