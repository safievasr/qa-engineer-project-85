  requirement: |
    В процессе игры пользователь после написания правильного решения отправляет данные на проверку и получает успешный результат
  prerequisites: |
    Создана битва. Открыта игровая комната
  test-data: |
    "Написан успешный код"
  steps:
    - В редакторе кода пишем корректное решение задачи
    - Нажимаем кнопку «Запустить»
  expected-result: |
    Успешная проверка по решению задачи, все тесты пройдены

